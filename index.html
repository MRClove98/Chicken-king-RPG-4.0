<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chicken King RPG 4.0</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial}
canvas{display:block;background:#84d46b}
#hud{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);padding:10px;border-radius:8px}
#panel{position:absolute;top:10px;right:10px;background:white;padding:10px;border-radius:8px;display:none;width:240px}
.bar{width:220px;height:16px;background:#900}
.fill{height:100%;background:#0c0;width:100%}
button{margin:4px}
</style>
</head>
<body>
<div id="hud">
<b>🐔 Chicken King RPG 4.0</b><br>
<div class="bar"><div id="hpfill" class="fill"></div></div>
<div id="hptext">100/100</div>
<div id="stats"></div>
<div>WASD Move • SPACE Attack • E Interact • I Inventory • H Heal</div>
</div>
<div id="panel"></div>
<canvas id="game"></canvas>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
const panel=document.getElementById("panel");
function resize(){c.width=innerWidth;c.height=innerHeight} resize(); onresize=resize;

const player={x:0,y:0,hp:100,maxHp:100,coins:50,xp:0,lvl:1,atk:5,potions:2};
const pet={x:-40,y:-40};
const shop={x:300,y:200};
const witch={x:-250,y:100};
const boss={x:1200,y:900,hp:300,maxHp:300};
const keys={};
let kills=0;

const enemies=[];
function spawnEnemy(){
 const types=["🦊","🐺","🦅"];
 enemies.push({
   x:(Math.random()-.5)*2200,
   y:(Math.random()-.5)*2200,
   hp:30,maxHp:30,
   emoji:types[Math.floor(Math.random()*types.length)]
 });
}
for(let i=0;i<20;i++) spawnEnemy();

function show(html){panel.style.display="block";panel.innerHTML=html;}
function hide(){panel.style.display="none";}
window.hide=hide;
window.buySword=()=>{if(player.coins>=25){player.coins-=25;player.atk+=3;}};
window.buyPotion=()=>{if(player.coins>=10){player.coins-=10;player.potions++;}};

addEventListener("keydown",e=>{
 const k=e.key.toLowerCase();
 keys[k]=true;

 if(k==="i"){
  show(`<h3>🎒 Inventory</h3>Coins: ${player.coins}<br>Potions: ${player.potions}<br>Attack: ${player.atk}<br><button onclick="hide()">Close</button>`);
 }

 if(k==="e"){
  if(Math.hypot(player.x-shop.x,player.y-shop.y)<150){
   show(`<h3>🏪 Shop</h3>
   <button onclick="buySword()">⚔️ Sword +3 (25)</button><br>
   <button onclick="buyPotion()">🧪 Potion (10)</button><br>
   <button onclick="hide()">Close</button>`);
  }
  if(Math.hypot(player.x-witch.x,player.y-witch.y)<150){
   show(`<h3>🧙 Witch Quest</h3>Defeat 10 enemies.<br>Progress: ${kills}/10<br><button onclick="hide()">Close</button>`);
  }
 }

 if(k==="h" && player.potions>0){
   player.potions--;
   player.hp=Math.min(player.maxHp,player.hp+40);
 }
});
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function update(){
 if(keys.w) player.y-=4;
 if(keys.s) player.y+=4;
 if(keys.a) player.x-=4;
 if(keys.d) player.x+=4;

 pet.x+=(player.x-40-pet.x)*0.08;
 pet.y+=(player.y-40-pet.y)*0.08;

 enemies.forEach(en=>{
   const dx=player.x-en.x, dy=player.y-en.y;
   const d=Math.hypot(dx,dy);
   if(d<260){en.x+=dx/d; en.y+=dy/d;}
   if(d<25) player.hp=Math.max(0,player.hp-0.05);
   if(keys[" "] && d<90) en.hp-=player.atk*0.2;
 });

 for(let i=enemies.length-1;i>=0;i--){
   if(enemies[i].hp<=0){
      enemies.splice(i,1);
      spawnEnemy();
      player.coins+=10;
      player.xp+=10;
      kills++;
   }
 }

 const bd=Math.hypot(player.x-boss.x,player.y-boss.y);
 if(keys[" "] && bd<120) boss.hp=Math.max(0,boss.hp-player.atk*0.15);

 while(player.xp>=player.lvl*100){
   player.xp-=player.lvl*100;
   player.lvl++;
   player.atk+=2;
   player.maxHp+=10;
   player.hp=player.maxHp;
 }

 hpfill.style.width=(player.hp/player.maxHp*100)+"%";
 hptext.textContent=Math.floor(player.hp)+"/"+player.maxHp;
 stats.textContent=`⭐${player.lvl} 🪙${player.coins} ⚔️${player.atk} 🧪${player.potions}`;
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 const camX=player.x-c.width/2, camY=player.y-c.height/2;

 ctx.fillStyle="brown";
 ctx.fillRect(shop.x-camX,shop.y-camY,140,140);
 ctx.fillStyle="white";
 ctx.font="24px Arial";
 ctx.textAlign="center";
 ctx.fillText("SHOP",shop.x-camX+70,shop.y-camY+75);

 ctx.font="40px Arial";
 ctx.fillText("🧙",witch.x-camX,witch.y-camY);

 enemies.forEach(en=>{
   const sx=en.x-camX, sy=en.y-camY;
   ctx.font="32px Arial";
   ctx.fillText(en.emoji,sx,sy);

   ctx.fillStyle="red";
   ctx.fillRect(sx-15,sy-22,40,6);
   ctx.fillStyle="lime";
   ctx.fillRect(sx-15,sy-22,40*(en.hp/en.maxHp),6);
   ctx.fillStyle="black";
 });

 ctx.fillStyle="red";
 ctx.fillRect(c.width/2-150,20,300,12);
 ctx.fillStyle="purple";
 ctx.fillRect(c.width/2-150,20,300*(boss.hp/boss.maxHp),12);
 ctx.fillStyle="white";
 ctx.font="14px Arial";
 ctx.textAlign="center";
 ctx.fillText("BOSS HP: "+Math.floor(boss.hp)+"/"+boss.maxHp,c.width/2,15);

 ctx.font="50px Arial";
 ctx.fillText("👑",boss.x-camX,boss.y-camY);

 ctx.font="28px Arial";
 ctx.fillText("🐣",pet.x-camX,pet.y-camY);

 ctx.font="48px Arial";
 ctx.fillText("🐔",c.width/2,c.height/2);
}

(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
