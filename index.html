<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chicken King Real Edition</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial}
canvas{display:block;background:#7ccf6a}
#ui{position:absolute;left:10px;top:10px;background:rgba(255,255,255,.92);padding:10px;border-radius:8px}
#panel{position:absolute;right:10px;top:10px;background:white;padding:10px;border-radius:8px;display:none;width:240px}
button{margin:4px}
</style>
</head>
<body>
<div id="ui">
<b>🐔 Chicken King Real Edition</b><br>
WASD Move | SPACE Attack | E Interact | I Inventory | H Heal
<div id="stats"></div>
</div>
<div id="panel"></div>
<canvas id="game"></canvas>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight} rs(); onresize=rs;

const p={x:0,y:0,hp:100,maxHp:100,lvl:1,xp:0,coins:50,atk:6,potions:1};
const pet={x:-50,y:-50};
const keys={};
const panel=document.getElementById("panel");

const shop={x:250,y:250};
const npc={x:-250,y:0};
const boss={x:1200,y:1200,hp:400,maxHp:400,alive:true};

const enemies=[];
for(let i=0;i<30;i++) spawnEnemy();

let questKills=0;

function spawnEnemy(){
 enemies.push({x:(Math.random()-.5)*3000,y:(Math.random()-.5)*3000,hp:30,max:30,emoji:["🦊","🐺","🦅"][Math.floor(Math.random()*3)]});
}

addEventListener("keydown",e=>{
 keys[e.key.toLowerCase()]=true;

 if(e.key.toLowerCase()=="i"){
  panel.style.display="block";
  panel.innerHTML=`<h3>🎒 Inventory</h3>
  Potions: ${p.potions}<br>
  Attack: ${p.atk}<br>
  Coins: ${p.coins}<br>
  <button onclick="hidePanel()">Close</button>`;
 }

 if(e.key.toLowerCase()=="e"){
   if(Math.hypot(p.x-shop.x,p.y-shop.y)<140){
     panel.style.display="block";
     panel.innerHTML=`<h3>🏪 Shop</h3>
     Coins: ${p.coins}<br>
     <button onclick="buySword()">Sword +3 (30)</button>
     <button onclick="buyPotion()">Potion (10)</button>
     <button onclick="buyArmor()">Max HP +20 (40)</button>
     <button onclick="hidePanel()">Close</button>`;
   }

   if(Math.hypot(p.x-npc.x,p.y-npc.y)<120){
     panel.style.display="block";
     panel.innerHTML=`<h3>📜 Quest</h3>
     Defeat 10 enemies.<br>
     Progress: ${questKills}/10<br>
     Reward: 100 coins`;
   }
 }

 if(e.key.toLowerCase()=="h" && p.potions>0){
   p.potions--;
   p.hp=Math.min(p.maxHp,p.hp+40);
 }
});
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function hidePanel(){panel.style.display="none";}
function buySword(){if(p.coins>=30){p.coins-=30;p.atk+=3;}}
function buyPotion(){if(p.coins>=10){p.coins-=10;p.potions++;}}
function buyArmor(){if(p.coins>=40){p.coins-=40;p.maxHp+=20;p.hp=p.maxHp;}}

function update(){
 if(keys.w)p.y-=4;
 if(keys.s)p.y+=4;
 if(keys.a)p.x-=4;
 if(keys.d)p.x+=4;

 pet.x+=(p.x-50-pet.x)*0.08;
 pet.y+=(p.y-50-pet.y)*0.08;

 enemies.forEach(e=>{
   let dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy);
   if(d<350){e.x+=dx/d*1.1;e.y+=dy/d*1.1;}
   if(d<28)p.hp-=0.04;
   if(keys[" "] && d<90)e.hp-=p.atk*0.18;
 });

 for(let i=enemies.length-1;i>=0;i--){
   if(enemies[i].hp<=0){
     enemies.splice(i,1);
     p.coins+=10;
     p.xp+=15;
     questKills++;
     spawnEnemy();
   }
 }

 if(questKills>=10){
   p.coins+=100;
   questKills=-9999;
 }

 if(boss.alive){
   let d=Math.hypot(p.x-boss.x,p.y-boss.y);
   if(d<450){boss.x+=(p.x-boss.x)/d*0.7; boss.y+=(p.y-boss.y)/d*0.7;}
   if(d<40)p.hp-=0.12;
   if(keys[" "] && d<120)boss.hp-=p.atk*0.12;
   if(boss.hp<=0){boss.alive=false;p.coins+=500;p.xp+=500;}
 }

 while(p.xp>=p.lvl*100){
   p.xp-=p.lvl*100;
   p.lvl++;
   p.atk+=2;
   p.maxHp+=10;
   p.hp=p.maxHp;
 }

 stats.textContent=`❤️${Math.floor(p.hp)}/${p.maxHp} ⭐Lv${p.lvl} XP:${p.xp} 🪙${p.coins} ⚔️${p.atk} 🧪${p.potions}`;
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 const camX=p.x-c.width/2, camY=p.y-c.height/2;

 for(let x=-4000;x<=4000;x+=100){
   ctx.strokeStyle="rgba(0,0,0,.05)";
   ctx.beginPath();ctx.moveTo(x-camX,-4000-camY);ctx.lineTo(x-camX,4000-camY);ctx.stroke();
 }

 ctx.fillStyle="brown";
 ctx.fillRect(shop.x-camX,shop.y-camY,130,130);
 ctx.fillStyle="white";
 ctx.fillText("SHOP",shop.x-camX+40,shop.y-camY+70);

 ctx.font="32px Arial";
 ctx.fillText("🧙",npc.x-camX,npc.y-camY);

 enemies.forEach(e=>{
   let sx=e.x-camX, sy=e.y-camY;
   ctx.font="30px Arial";
   ctx.fillText(e.emoji,sx,sy);
   ctx.fillStyle="red"; ctx.fillRect(sx,sy-15,30,4);
   ctx.fillStyle="lime"; ctx.fillRect(sx,sy-15,30*(e.hp/e.max),4);
 });

 if(boss.alive){
    ctx.font="56px Arial";
    ctx.fillText("👑",boss.x-camX,boss.y-camY);
 }

 ctx.font="28px Arial";
 ctx.fillText("🐣",pet.x-camX,pet.y-camY);

 ctx.font="50px Arial";
 ctx.fillText("🐔",c.width/2,c.height/2+Math.sin(Date.now()/150)*4);

 if(keys[" "]){
   ctx.beginPath();
   ctx.arc(c.width/2,c.height/2,90,0,Math.PI*2);
   ctx.strokeStyle="gold";
   ctx.stroke();
 }
}

(function loop(){update();draw();requestAnimationFrame(loop)})();
</script>
</body>
</html>
